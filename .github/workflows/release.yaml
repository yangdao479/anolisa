name: Release

on:
  push:
    tags:
      - 'cosh/v*'
      - 'sec-core/v*'
      - 'sight/v*'
      - 'skill/v*'

permissions:
  contents: write
  actions: read

jobs:
  # =========================================================================
  # Step 1: Parse tag and package
  # Triggered by push tag; produces official artifacts retained 28 days.
  # =========================================================================
  package:
    name: Package ${{ github.ref_name }}
    runs-on: ubuntu-22.04
    outputs:
      component: ${{ steps.parse.outputs.component }}
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}
      archive-sha256: ${{ steps.package-source.outputs.archive-sha256 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SCOPE="${TAG%%/v*}"
          VERSION="${TAG#*/v}"

          case "$SCOPE" in
            cosh)     COMPONENT="copilot-shell" ;;
            sec-core) COMPONENT="agent-sec-core" ;;
            sight)    COMPONENT="agentsight" ;;
            skill)    COMPONENT="os-skills" ;;
            *)
              echo "Unknown scope: $SCOPE"
              exit 1
              ;;
          esac

          echo "component=$COMPONENT" >> $GITHUB_OUTPUT
          echo "version=$VERSION"     >> $GITHUB_OUTPUT
          echo "tag=$TAG"             >> $GITHUB_OUTPUT

          echo "### Parsed Tag" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`$TAG\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`$COMPONENT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY

      - name: Package source archive
        id: package-source
        uses: ./.github/actions/package-source
        with:
          component: ${{ steps.parse.outputs.component }}
          version: ${{ steps.parse.outputs.version }}
          artifact-suffix: ''
          retention-days: 28
          skill-sign-private-key: ${{ secrets.SKILL_SIGN_PRIVATE_KEY }}
          skill-sign-public-key: ${{ vars.SKILL_SIGN_PUBLIC_KEY }}

      - name: Package vendor archive
        uses: ./.github/actions/package-vendor
        with:
          component: ${{ steps.parse.outputs.component }}
          version: ${{ steps.parse.outputs.version }}
          artifact-suffix: ''
          retention-days: 28

  # =========================================================================
  # Step 2: Publish (requires manual approval via GitHub Environment)
  #
  # If reviewer rejects, no Release is created.
  # =========================================================================
  publish:
    name: Publish ${{ needs.package.outputs.tag }}
    needs: package
    environment: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download official artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.component }}-${{ needs.package.outputs.version }}
          path: /tmp/archives

      - name: Verify official artifact checksum
        run: |
          COMPONENT="${{ needs.package.outputs.component }}"
          VERSION="${{ needs.package.outputs.version }}"
          ARCHIVE="/tmp/archives/${COMPONENT}-${VERSION}.tar.gz"
          EXPECTED="${{ needs.package.outputs.archive-sha256 }}"
          ACTUAL=$(sha256sum "$ARCHIVE" | awk '{print $1}')
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Checksum mismatch for ${ARCHIVE}"
            echo "::error::Expected: $EXPECTED"
            echo "::error::Actual:   $ACTUAL"
            exit 1
          fi
          echo "Checksum verified: $ACTUAL"

      - name: Download vendor artifact (if exists)
        id: download-vendor
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.component }}-${{ needs.package.outputs.version }}-vendor
          path: /tmp/archives

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMPONENT="${{ needs.package.outputs.component }}"
          VERSION="${{ needs.package.outputs.version }}"
          TAG="${{ needs.package.outputs.tag }}"
          ARCHIVE="/tmp/archives/${COMPONENT}-${VERSION}.tar.gz"

          case "$COMPONENT" in
            copilot-shell)  PREFIX="cosh/v" ;;
            agent-sec-core) PREFIX="sec-core/v" ;;
            agentsight)     PREFIX="sight/v" ;;
            os-skills)      PREFIX="skill/v" ;;
          esac

          PREV_TAG=$(git tag --list "${PREFIX}*" --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/commits/${TAG}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          NOTES="## ${COMPONENT} v${VERSION}\n\n<!-- Add release notes here -->\n\n## What's Changed\n\n<!-- List the key changes in this release -->\n\n**Full Changelog**: ${COMPARE_URL}"

          # Collect all assets to upload
          ASSETS=("$ARCHIVE")
          VENDOR_ARCHIVE="/tmp/archives/${COMPONENT}-${VERSION}-vendor.tar.gz"
          if [ -f "$VENDOR_ARCHIVE" ]; then
            ASSETS+=("$VENDOR_ARCHIVE")
          fi

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "::error::Release '$TAG' already exists."
            echo "::error::If you need to re-publish, delete the existing release first, then re-run this workflow."
            exit 1
          fi

          gh release create "$TAG" \
            --title "${COMPONENT} v${VERSION}" \
            --notes "$(printf '%b' "${NOTES}")" \
            --target "$(git rev-list -n 1 $TAG)" \
            "${ASSETS[@]}"

          RELEASE_URL=$(gh release view "$TAG" --json url --jq '.url')

          echo "### Release Created" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`${COMPONENT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | [View Release](${RELEASE_URL}) |" >> $GITHUB_STEP_SUMMARY
          if [ -f "$VENDOR_ARCHIVE" ]; then
            echo "| Vendor | \`${COMPONENT}-${VERSION}-vendor.tar.gz\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Changelog | [Compare](${COMPARE_URL}) |" >> $GITHUB_STEP_SUMMARY
