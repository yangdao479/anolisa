name: sec-core-rpmbuild

on:
  pull_request:
    branches:
      - 'release/agent-sec-core/**'
  workflow_dispatch:       # 支持手动触发

permissions:
  contents: read

jobs:
  build-rpm:
    name: Build agent-sec-core RPM
    runs-on: ubuntu-22.04
    container:
      image: alibaba-cloud-linux-4-registry.cn-hangzhou.cr.aliyuncs.com/alinux4/alinux4:latest
    steps:
      - name: Configure mirrors and install dependencies
        run: |
          sed -i -e "s/cloud.aliyuncs/aliyun/g" /etc/yum.repos.d/*.repo
          dnf install -y tar git rpm-build gcc make clang llvm \
                         openssl-devel libseccomp-devel bubblewrap \
                         python3-pip

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93.0'

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.11.6'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build RPM
        run: ./scripts/rpm-build.sh agent-sec-core

      - name: "Integrity check 1: pre-brp vs RPM contents (detect brp tampering)"
        run: |
          set -euo pipefail

          # pre-brp manifest was generated inside spec %install, before brp scripts ran
          if [ ! -f /tmp/pre-brp-manifest.txt ]; then
            echo "ERROR: /tmp/pre-brp-manifest.txt not found (spec %install did not generate it)"
            exit 1
          fi

          # Extract all RPMs into a single tree
          RPM_EXTRACT=$(mktemp -d)
          for rpm in scripts/rpmbuild/RPMS/**/*.rpm; do
            [ -f "$rpm" ] || continue
            rpm2cpio "$rpm" | (cd "$RPM_EXTRACT" && cpio -idm 2>/dev/null)
          done

          # Hash all regular files from RPM extraction
          (cd "$RPM_EXTRACT" && find . -type f | sort | xargs -r sha256sum) > /tmp/rpm-manifest-all.txt

          echo "=== Check 1: pre-brp vs RPM (brp tampering detection) ==="
          echo "Baseline: pre-brp manifest (files from %install)"
          MISMATCHED=0
          VERIFIED=0
          EXTRA=0
          # Check every pre-brp file exists in RPM with same hash
          while IFS= read -r line; do
            pre_hash=$(echo "$line" | awk '{print $1}')
            pre_file=$(echo "$line" | awk '{print $2}')
            rpm_line=$(grep -F -- "$pre_file" /tmp/rpm-manifest-all.txt | grep -F " ${pre_file}$" || true)
            if [ -z "$rpm_line" ]; then
              echo "MISSING in RPM: $pre_file"
              MISMATCHED=$((MISMATCHED + 1))
            else
              rpm_hash=$(echo "$rpm_line" | awk '{print $1}')
              if [ "$pre_hash" != "$rpm_hash" ]; then
                echo "BRP MODIFIED: $pre_file"
                echo "  pre-brp: $pre_hash"
                echo "  RPM:     $rpm_hash"
                MISMATCHED=$((MISMATCHED + 1))
              else
                VERIFIED=$((VERIFIED + 1))
              fi
            fi
          done < /tmp/pre-brp-manifest.txt

          # Report files in RPM but not in pre-brp (brp-generated, e.g. .pyc)
          while IFS= read -r line; do
            rpm_file=$(echo "$line" | awk '{print $2}')
            if ! grep -qF " ${rpm_file}$" /tmp/pre-brp-manifest.txt; then
              echo "EXTRA (brp-generated): $rpm_file"
              EXTRA=$((EXTRA + 1))
            fi
          done < /tmp/rpm-manifest-all.txt

          rm -rf "$RPM_EXTRACT"
          echo ""
          echo "Files verified: $VERIFIED | brp modified: $MISMATCHED | brp-generated extras: $EXTRA"
          if [ "$MISMATCHED" -gt 0 ]; then
            echo "::error::brp integrity check failed: $MISMATCHED file(s) modified by brp scripts"
            exit 1
          fi
          echo "All $VERIFIED files from %install unchanged by brp scripts"

      - name: List RPM contents
        run: |
          echo "=== RPM files built ==="
          find scripts/rpmbuild/RPMS -name '*.rpm' | sort
          echo ""
          for rpm in scripts/rpmbuild/RPMS/**/*.rpm; do
            echo "========================================"
            echo ">>> $rpm"
            echo "========================================"
            if [[ "$rpm" == *agent-sec-cli* ]]; then
              rpm -qip "$rpm"
              echo "--- Files (site-packages grouped by top-level) ---"
              rpm -qlp "$rpm" | awk -F'site-packages/' '
                /site-packages\//{seen[$2]=1; split($2,a,"/"); top[a[1]]=1; next}
                {print}
              END{for(t in top) print "/opt/agent-sec/lib/python3.11/site-packages/" t "/..."}
              ' | sort
            else
              rpm -qlvp "$rpm"
            fi
            echo ""
          done

      - name: Test RPM installation
        run: |
          dnf makecache
          dnf install -y scripts/rpmbuild/RPMS/**/*.rpm
          agent-sec-cli --help

      - name: "Integrity check 2: pre-brp vs installed files (detect install tampering)"
        run: |
          set -euo pipefail

          if [ ! -f /tmp/pre-brp-manifest.txt ]; then
            echo "ERROR: /tmp/pre-brp-manifest.txt not found"
            exit 1
          fi

          echo "=== Check 2: pre-brp vs installed files ==="
          echo "Baseline: pre-brp manifest (files from %install)"
          MISMATCHED=0
          VERIFIED=0
          while IFS= read -r line; do
            pre_hash=$(echo "$line" | awk '{print $1}')
            pre_file=$(echo "$line" | awk '{print $2}')
            # pre_file is like ./opt/agent-sec/... -> installed at /opt/agent-sec/...
            installed_file="${pre_file#.}"
            if [ ! -f "$installed_file" ]; then
              echo "MISSING on disk: $installed_file"
              MISMATCHED=$((MISMATCHED + 1))
            else
              installed_hash=$(sha256sum "$installed_file" | awk '{print $1}')
              if [ "$pre_hash" != "$installed_hash" ]; then
                echo "INSTALL MODIFIED: $installed_file"
                echo "  pre-brp:   $pre_hash"
                echo "  installed: $installed_hash"
                MISMATCHED=$((MISMATCHED + 1))
              else
                VERIFIED=$((VERIFIED + 1))
              fi
            fi
          done < /tmp/pre-brp-manifest.txt

          echo ""
          echo "Files verified: $VERIFIED | install modified: $MISMATCHED"
          if [ "$MISMATCHED" -gt 0 ]; then
            echo "::error::Install integrity check failed: $MISMATCHED file(s) modified during installation"
            exit 1
          fi
          echo "All $VERIFIED files from %install unchanged after installation"

      - name: Verify Python dependencies match requirements.txt
        run: |
          echo "Checking installed Python packages against requirements.txt ..."
          export PYTHONPATH=/opt/agent-sec/lib/python3.11/site-packages${PYTHONPATH:+:$PYTHONPATH}
          python3.11 << 'PYEOF'
          import importlib.metadata, sys
          from packaging.requirements import Requirement
          from packaging.version import Version

          with open('src/agent-sec-core/agent-sec-cli/requirements.txt') as f:
              reqs = [l.strip() for l in f if l.strip() and not l.strip().startswith('#')]
          failed = []
          skipped = 0
          for raw in reqs:
              req = Requirement(raw)
              if req.marker and not req.marker.evaluate():
                  skipped += 1
                  continue
              try:
                  installed_ver = Version(importlib.metadata.version(req.name))
              except importlib.metadata.PackageNotFoundError:
                  failed.append(f'{req.name}: not installed')
                  continue
              if req.specifier and not req.specifier.contains(installed_ver):
                  failed.append(f'{req.name}: {installed_ver} does not match {req.specifier}')
          if failed:
              print(f'ERROR: {len(failed)} dependency check(s) failed:', file=sys.stderr)
              for item in failed:
                  print(f'  - {item}', file=sys.stderr)
              sys.exit(1)
          print(f'All {len(reqs) - skipped} dependencies verified ({skipped} skipped due to platform markers).')
          PYEOF

      - name: Verify all Python imports
        run: |
          export PYTHONPATH=/opt/agent-sec/lib/python3.11/site-packages${PYTHONPATH:+:$PYTHONPATH}
          python3 << 'PYEOF'
          import importlib, pathlib, sys, os

          import agent_sec_cli
          site_pkg = pathlib.Path(agent_sec_cli.__file__).parent
          print(f'Package location: {site_pkg}')

          # Collect all .py files and convert to module names
          modules = []
          for pyfile in sorted(site_pkg.rglob('*.py')):
              if '__pycache__' in pyfile.parts:
                  continue
              rel = pyfile.relative_to(site_pkg.parent)
              parts = list(rel.with_suffix('').parts)
              if parts[-1] == '__init__':
                  parts = parts[:-1]
              modules.append('.'.join(parts))

          failed = []
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'  {mod} ... OK')
              except Exception as e:
                  print(f'  {mod} ... FAILED: {e}')
                  failed.append((mod, str(e)))

          print(f'\nTotal: {len(modules)} modules, {len(failed)} failed')
          if failed:
              print('\nFailed modules:', file=sys.stderr)
              for mod, err in failed:
                  print(f'  - {mod}: {err}', file=sys.stderr)
              sys.exit(1)
          print('All modules imported successfully')
          PYEOF

      - name: Upload RPM artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: agent-sec-core-rpms-${{ github.run_number }}-${{ github.sha }}
          path: scripts/rpmbuild/RPMS/**/*.rpm
          retention-days: 7
